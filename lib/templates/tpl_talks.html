<!doctype html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Program</title>
    <link rel="stylesheet" href="style_program.css" />
</head>

<body>
    <main>
        {% for status, talks in talks.items() %}
            <h2>{{ status }}</h2>
            {% for talk in talks %}
                <div class="talk">
                    {{ talk}}
                </div>
            {% endfor %}
        {% endfor %}
    </main>
</body>

</html>
